<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greatness is loading - Soon</title>
<link rel="icon" href="icon.png" type="image/png"> <!-- Ajouter votre propre icône en format PNG -->
<style>
  body, html {
    height: 100%;
    margin: 0;
    display: flex;
    flex-direction: column; /* Pour placer l'icône et le texte verticalement */
    justify-content: center;
    align-items: center;
    background-color: #2c3e50; /* Fond bleu foncé */
    color: #ecf0f1; /* Couleur de texte gris clair */
    font-family: "Arial Rounded MT Bold", Arial, sans-serif; /* Famille de polices */
  }
  .title-container {
    display: flex;
    align-items: center;
  }
  .soon-text {
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    margin-left: 10px; /* Espace entre l'icône et le texte */
  }
  .highlight {
    color: #f39c12; /* Couleur de mise en évidence (orange) */
  }
</style>
</head>
<body>
<div class="title-container">
  <i class="fas fa-star fa-2x"></i> <!-- Icône d'étoile -->
  <div class="soon-text">
    <p><span class="highlight">Greatness</span> is loading - <span class="highlight">Soon</span></p>
  </div>
</div>
</body>
</html>
